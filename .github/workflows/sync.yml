name: Config Update

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * 5'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: "Setup Mihomo"
      run: |
        set -Eeuo pipefail
        VERSION=$(curl -L "https://github.com/MetaCubeX/mihomo/releases/download/Prerelease-Alpha/version.txt")
        wget -O mihomo.deb "https://github.com/MetaCubeX/mihomo/releases/download/Prerelease-Alpha/mihomo-linux-amd64-${VERSION}.deb"
        sudo dpkg -i mihomo.deb
    - name: Set up Python3
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests pyyaml urllib3
    - name: Run script
      run: python main.py
    - name: Commit and push
      run: |
        git config --global user.email "action@github.com"
        git config --global user.name "GitHub Action"
        git add rule/*.json
        git add rule/*.mrs
        git add rule/*.srs

        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Update rules"
          git push
        fi
